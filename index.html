<style>
:root{
  --navy:#0F2854; --blue:#1C4D8D; --sky:#4988C4; --cyan:#BDE8F5;
  --paper:#FFFFFF; --wash:#F5F8FC; --line:#E3E9F1; --ink:#16202F; --muted:#5A6A80;
  --display:"IBM Plex Sans",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif;
  --maxw:1240px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{margin:0;font-family:var(--body);color:var(--ink);background:var(--paper);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;width:100%}
#app{flex:1 0 auto;min-width:0}
body{cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2724%27%20height%3D%2724%27%20viewBox%3D%270%200%2024%2024%27%3E%3Ccircle%20cx%3D%2712%27%20cy%3D%2712%27%20r%3D%278%27%20fill%3D%27none%27%20stroke%3D%27%231C4D8D%27%20stroke-width%3D%271.8%27%2F%3E%3Ccircle%20cx%3D%2712%27%20cy%3D%2712%27%20r%3D%271.1%27%20fill%3D%27%231C4D8D%27%2F%3E%3C%2Fsvg%3E") 12 12, auto}
a,button,.card,.chip,.tag,.ext,.sbtn,.btn,.more,.leader-item,.lead-item,summary,label,select,[role='button']{cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2730%27%20height%3D%2730%27%20viewBox%3D%270%200%2030%2030%27%3E%3Ccircle%20cx%3D%2715%27%20cy%3D%2715%27%20r%3D%2710%27%20fill%3D%27rgba%2828%2C77%2C141%2C0.16%29%27%20stroke%3D%27%231C4D8D%27%20stroke-width%3D%272%27%2F%3E%3Ccircle%20cx%3D%2715%27%20cy%3D%2715%27%20r%3D%273%27%20fill%3D%27%231C4D8D%27%2F%3E%3C%2Fsvg%3E") 15 15, pointer}
input,textarea,[contenteditable],.rte{cursor:text}
body{-webkit-user-select:none;-ms-user-select:none;user-select:none}
input,textarea,select,[contenteditable],.rte,#adminModal,#adminModal *{-webkit-user-select:text;-ms-user-select:text;user-select:text}
img{-webkit-user-drag:none;user-drag:none}
h1,h2,h3,h4{font-family:var(--display);line-height:1.13;margin:0;letter-spacing:-.01em;overflow-wrap:break-word}
a{color:var(--blue);text-decoration:none}a:hover{color:var(--sky)}
img,svg,iframe,video{max-width:100%}
img{max-width:100%;display:block}
input,textarea,select,.rte{max-width:100%}
button{font-family:var(--body);cursor:pointer}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ── HEADER: compact classic ── */
header.mast{background:var(--navy);color:#fff;position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(255,255,255,.07)}
.mast .wrap{display:flex;align-items:center;gap:6px;height:52px}
.brand{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.02em;color:#fff;margin-right:12px;white-space:nowrap}
.brand .dot{color:var(--sky)}
.brand .lo{color:var(--cyan)}
nav.main{display:flex;gap:2px;margin-left:auto;align-items:center}
nav.main a{color:#cdd8ea;font-weight:500;font-size:14px;padding:6px 11px;border-radius:7px}
nav.main a:hover{color:#fff;background:rgba(255,255,255,.08)}
nav.main a.active{color:#fff;background:rgba(255,255,255,.12)}
/* LinkedIn icon-only button */
.li-icon{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#cdd8ea;margin-left:4px;transition:background .15s,color .15s}
.li-icon:hover{background:#fff;color:var(--navy);border-color:#fff}
.li-icon svg{width:17px;height:17px}
.menu-btn{display:none;margin-left:auto;background:transparent;border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:7px 11px;font-size:17px}

/* ── generic btns ── */
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:8px;padding:11px 20px;font-weight:600;font-size:15px;border:1px solid transparent;background:none}
.btn.primary{background:var(--sky);color:#fff}.btn.primary:hover{background:#5c9bd4}
.btn.ghost{color:#fff;border-color:rgba(255,255,255,.34)}.btn.ghost:hover{border-color:#fff}
.btn.dark{background:var(--navy);color:#fff}.btn.dark:hover{background:#16386f}
.btn.line{border-color:var(--line);color:var(--blue)}.btn.line:hover{border-color:var(--sky)}

/* ── hero ── */
.hero{background:var(--navy);color:#fff;padding:60px 0 64px}
.hero .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--sky);font-weight:600}
.hero h1{font-size:clamp(34px,5vw,58px);margin:12px 0 6px;font-weight:700;letter-spacing:-.02em}
.hero .role{font-size:clamp(16px,2vw,20px);color:var(--cyan);font-weight:500;margin-bottom:14px}
.hero p{max-width:58ch;color:#c5d2e8;font-size:17px;margin:0}
.hero .cta{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap;align-items:center}
.home-top{background:var(--navy);color:#fff;padding:36px 0 30px}
.home-top .eyebrow{display:block;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);font-weight:600;margin-bottom:18px}
.home-search{position:relative;max-width:560px}
.home-search .hs-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#90a0b8;pointer-events:none}
.home-search input{width:100%;box-sizing:border-box;padding:13px 16px 13px 44px;border:1px solid transparent;border-radius:999px;font-size:15px;font-family:inherit;background:#fff;color:var(--navy);outline:none}
.home-search input::placeholder{color:#90a0b8}
.home-search input:focus{box-shadow:0 0 0 3px rgba(73,136,196,.5)}
.home-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.topic-chip{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;text-decoration:none;transition:.15s}
.topic-chip:hover{background:#fff;color:var(--navy);border-color:#fff}
.lm-wrap{display:flex;justify-content:center;margin-top:24px}

/* ── home: stat band ── */
.stat-band{background:var(--wash);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:26px 0}
.stat-band .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.sstat{text-align:center;padding:0 16px;border-right:1px solid var(--line)}
.sstat:last-child{border-right:0}
.sstat .sv{font-family:var(--display);font-size:28px;font-weight:700;color:var(--navy)}
.sstat .sk{font-size:13px;color:var(--muted);margin-top:3px}

/* ── section ── */
main{min-height:60vh}
.section{padding:54px 0}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:28px;border-bottom:2px solid var(--navy);padding-bottom:11px}
.sec-head h2{font-size:clamp(22px,2.5vw,30px);color:var(--navy);font-weight:700}
.sec-head .kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--sky);font-weight:600;display:block;margin-bottom:4px}
.sec-head p{margin:6px 0 0;color:var(--muted);font-size:14.5px;max-width:62ch}
.sec-head a.more{font-size:14px;font-weight:600;white-space:nowrap}

/* ── home: feature blocks ── */
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:0}
.fcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .18s,transform .18s}
.fcard:hover{box-shadow:0 16px 36px -20px rgba(15,40,84,.45);transform:translateY(-2px)}
.fcard .fbar{height:5px}
.fcard .fbody{padding:22px 22px 24px;flex:1;display:flex;flex-direction:column}
.fcard .ficon{width:40px;height:40px;border-radius:10px;margin-bottom:14px;display:flex;align-items:center;justify-content:center}
.fcard h3{font-size:18px;color:var(--navy);margin-bottom:8px}
.fcard p{color:var(--muted);font-size:14px;line-height:1.6;margin:0 0 16px;flex:1}
.fcard .go{font-weight:600;font-size:14px;color:var(--blue);display:inline-flex;align-items:center;gap:5px;margin-top:auto}
.fcard .ftag{display:inline-block;font-size:11px;background:var(--wash);color:var(--muted);border-radius:4px;padding:2px 7px;font-weight:600;margin-bottom:10px;border:1px solid var(--line)}

/* ── home: spotlight ── */
.spotlight{display:block;background:#102a52;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:30px 34px;color:#fff;margin-bottom:8px;transition:border-color .18s,box-shadow .18s,transform .18s}
.spotlight:hover{border-color:rgba(255,255,255,.3);box-shadow:0 16px 40px -22px rgba(0,0,0,.6);transform:translateY(-2px)}
.spotlight .sl-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);font-weight:700;margin-bottom:10px}
.spotlight h3{font-size:26px;color:#fff;margin-bottom:12px;line-height:1.2;max-width:32ch}
.spotlight p{color:#b9c8e0;font-size:15.5px;margin:0 0 18px;max-width:72ch;line-height:1.6}
.spotlight .sl-foot{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;margin-top:4px}
.spotlight .sl-meta{font-size:13px;color:#93a8c8;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spotlight .sl-date{color:#93a8c8}
.spotlight .sl-tag{font-size:11.5px;font-weight:600;color:#cfe0f5;background:rgba(255,255,255,.12);border-radius:5px;padding:3px 9px}
.spotlight .btn{pointer-events:none}

/* ── publications ── */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.filters-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.filters-row .filters{margin-bottom:0}
.lang-filter{display:flex;gap:6px;align-items:center;flex-shrink:0}
.lang-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1}
.lang-btn .flag{width:22px;height:15px}
.lang-btn:hover{border-color:var(--sky)}
.lang-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:6px 14px;font-size:13.5px;font-weight:500}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip:hover{border-color:var(--sky);color:var(--blue)}.chip.active:hover{color:#fff}
.pub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.pub-grid.home{margin-top:4px}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;transition:box-shadow .18s,transform .18s;cursor:pointer;display:flex;flex-direction:column}
.card:hover{box-shadow:0 14px 34px -18px rgba(15,40,84,.45);transform:translateY(-2px)}
.card .cover{aspect-ratio:16/8;background:var(--navy);position:relative;overflow:hidden}
.card .cover img{width:100%;height:100%;object-fit:contain;display:block;position:relative;z-index:1}
.cover-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(16px) brightness(.62);transform:scale(1.2);z-index:0}
.art-hero{position:relative;margin:8px 0 20px;border-radius:14px;overflow:hidden;background:var(--navy);display:flex;justify-content:center}
.art-hero img{position:relative;z-index:1;width:auto;max-width:100%;max-height:480px;object-fit:contain;display:block}
.art-hero .cover-bg{filter:blur(28px) brightness(.5)}
@media(max-width:560px){.art-hero img{max-height:300px}}
.card .cover .cover-fallback{width:100%;height:100%;background:linear-gradient(135deg,var(--blue) 0%,var(--navy) 100%)}
.card .cover:after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:var(--sky);z-index:2}
.card .cover .tag{position:absolute;left:12px;top:12px;z-index:3;background:rgba(255,255,255,.92);color:var(--navy);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:3px 9px;border-radius:5px}
.card .cover .ext{position:absolute;right:10px;top:10px;z-index:3;background:var(--navy);color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.card .cbody{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column}
.card .meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:8px}
.card h3.t{font-size:18px;color:var(--navy);font-weight:700;margin-bottom:7px;line-height:1.22}
.card p.ex{color:var(--muted);font-size:14px;margin:0 0 12px;line-height:1.5}
.card .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto}
.card .tags span{font-size:11px;color:var(--blue);background:var(--cyan);border-radius:4px;padding:2px 7px;font-weight:600}
.flag{width:20px;height:14px;border-radius:2px;flex:0 0 auto;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
.empty{color:var(--muted);font-size:15px;padding:34px;text-align:center;border:1px dashed var(--line);border-radius:10px;grid-column:1/-1}

/* ── article ── */
.article{max-width:740px;margin:0 auto;padding:44px 24px 68px}
.article .back{font-size:14px;font-weight:600;color:var(--blue);display:inline-flex;gap:6px;align-items:center;margin-bottom:22px}
.article .meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);margin-bottom:12px}
.article h1{font-size:clamp(26px,4vw,38px);color:var(--navy);line-height:1.15;margin-bottom:14px}
.article .lead{font-size:18px;color:#3a4658;border-left:3px solid var(--sky);padding-left:16px;margin-bottom:24px}
.article .content{font-size:17px;line-height:1.76;color:#2b3648}
.article .content p{margin:0 0 18px}
.article .content h3{font-size:21px;color:var(--navy);margin:28px 0 10px}
.article .share{margin-top:32px;border-top:1px solid var(--line);padding-top:18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.article .share span{font-size:13px;color:var(--muted)}
.article .share .sbtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:36px;min-width:36px;padding:0 11px;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;line-height:1;transition:border-color .15s,background .15s,transform .15s}
.article .share .sbtn:hover{border-color:var(--sky);background:var(--wash);transform:translateY(-1px)}
.article .share .sbtn svg{width:16px;height:16px;display:block}
.article .share .sbtn.fb{color:#1877F2}
.article .share .sbtn.x{color:#0f1419}
.article .share .sbtn.li{color:#0A66C2}
.article .share .sbtn.copy{color:var(--blue)}

/* ── maps ── */
.map-page{padding-bottom:50px}
.map-tabs{display:flex;gap:8px;margin-bottom:22px}
.map-tabs a{border:1px solid var(--line);border-radius:999px;padding:8px 18px;font-size:14px;font-weight:600;color:var(--muted);transition:all .15s}
.map-tabs a.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.map-tabs a:hover{border-color:var(--sky);color:var(--blue)}.map-tabs a.active:hover{color:#fff}
.map-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
#svgmap-wrap{border-radius:14px;border:1px solid var(--line);overflow:hidden;background:#e8eef6;position:relative;user-select:none}
#svgmap-wrap svg{display:block;width:100%;height:auto}
.map-side{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
.map-side h3{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:12px;font-weight:700}
.legrow{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:14px;border:0;background:transparent;width:100%;text-align:left;color:var(--ink);border-bottom:1px solid var(--line);cursor:pointer}
.legrow:last-child{border-bottom:0}
.legrow:hover{color:var(--blue)}
.legrow .ln{width:22px;height:4px;border-radius:3px;flex:0 0 auto}
.legrow .sw{width:14px;height:14px;border-radius:3px;flex:0 0 auto}
.map-side small{display:block;color:var(--muted);font-size:11.5px;margin-top:14px;border-top:1px solid var(--line);padding-top:12px;line-height:1.55}

/* ── country modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(8,18,38,.55);backdrop-filter:blur(3px);z-index:2000;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:580px;width:100%;position:relative;box-shadow:0 30px 80px -30px rgba(8,18,38,.6);animation:rise .2s ease}
.admin .modal{max-width:860px}
@keyframes rise{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal .x{position:absolute;right:13px;top:13px;border:0;background:var(--wash);width:33px;height:33px;border-radius:9px;font-size:18px;color:var(--navy);z-index:2}
.modal .x:hover{background:var(--cyan)}
.eth-head{padding:22px 28px;color:#fff;border-radius:16px 16px 0 0}

let _gp={inited:false,token:null,client:null};

function pickFromDrive(onPick,onCancel){

  _gpInit().then(()=>{

function _gpShow(onPick,onCancel){

function wireSliders(root){
  (root||document).querySelectorAll("[data-slider]").forEach(s=>{
    const track=s.querySelector(".rs-track");
    const slides=[...s.querySelectorAll(".rs-slide")];
    const prev=s.querySelector(".rs-prev"),next=s.querySelector(".rs-next");
    const dots=[...s.querySelectorAll(".rs-dot")];
    if(!track||!slides.length)return;
    const step=()=>slides[0].getBoundingClientRect().width+18;
    const update=()=>{
      const x=track.scrollLeft,max=track.scrollWidth-track.clientWidth-1;
      if(prev)prev.disabled=x<=2;
      if(next)next.disabled=x>=max;
      const idx=Math.min(Math.round(x/step()),dots.length-1);
      dots.forEach((d,i)=>d.classList.toggle("active",i===idx));
    };
    if(prev)prev.addEventListener("click",()=>track.scrollBy({left:-step(),behavior:"smooth"}));
    if(next)next.addEventListener("click",()=>track.scrollBy({left:step(),behavior:"smooth"}));
    dots.forEach(d=>d.addEventListener("click",()=>track.scrollTo({left:(+d.dataset.i)*step(),behavior:"smooth"})));

    let t;track.addEventListener("scroll",()=>{clearTimeout(t);t=setTimeout(update,60);});

  });

function searchNorm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function searchPubs(q){
  const terms=searchNorm(q).split(/\s+/).filter(Boolean);
  if(!terms.length)return [];
  const scored=publicPubs().map(p=>{
    const F={ti:searchNorm(p.title),tg:searchNorm((p.tags||[]).join(" ")),ct:searchNorm(p.category),ex:searchNorm(p.excerpt),au:searchNorm(p.author),bd:searchNorm(String(p.body||"").replace(/<[^>]+>/g," "))};
    let score=0,ok=true;
    terms.forEach(t=>{let s=0;
      if(F.ti.includes(t)){s+=10;if((" "+F.ti).includes(" "+t))s+=4;}
      if(F.tg.includes(t))s+=6; if(F.ct.includes(t))s+=5;
      if(F.ex.includes(t))s+=3; if(F.au.includes(t))s+=3; if(F.bd.includes(t))s+=1;
      if(s===0)ok=false; score+=s;});
    return {p,score,ok};
  });
  return scored.filter(x=>x.ok).sort((a,b)=>b.score-a.score||byDate(a.p,b.p)).map(x=>x.p);
}

function chipsRow(active){

function pdfEmbedUrl(url){
  if(!url)return"";
  const g=url.match(/drive\.google\.com\/file\/d\/([^/?#]+)/)||(/drive\.google\.com/.test(url)?url.match(/[?&]id=([^&]+)/):null);
  if(g)return `https://drive.google.com/file/d/${g[1]}/preview`;
  if(/[?&]dl=0/.test(url))return url.replace(/([?&])dl=0/,"$1raw=1"); // Dropbox
  return url+(url.includes("#")?"":"#view=FitH");
}
function viewArticle(id){

  const main=isPdf

    :`<div class="content">${renderBody(p.body)||"<p>(No content yet.)</p>"}</div>`;
  return `<article class="article ${isPdf?'article-wide':''}">
    <a class="back" href="#/publications">← All publications</a>
    <div class="meta">${flagFor(p.lang)}<span>${esc(p.author||"t.ilias")}</span><span>·</span><span>${fmt(p.date)}</span>${readingTime(p)?`<span>·</span><span>${readingTime(p)}</span>`:""}</div>

    ${p.excerpt?`<p class="lead">${esc(p.excerpt)}</p>`:""}
    ${(!isPdf&&p.photo)?`<div class="art-hero"><div class="cover-bg" style="background-image:url('${esc(p.photo)}')"></div><img src="${esc(p.photo)}" alt="" onerror="this.closest('.art-hero').style.display='none'"></div>`:""}

    ${(p.references&&p.references.length)?`<div class="refbox"><h4>References</h4><ol>${p.references.map(r=>`<li>${esc(r)}</li>`).join("")}</ol></div>`:""}

const VIEW={lonMin:39.2,lonMax:50.8,latMin:38.2,latMax:44.3,W:900};
const KX=Math.cos((VIEW.latMin+VIEW.latMax)/2*Math.PI/180);
const XU=(VIEW.lonMax-VIEW.lonMin)*KX, YU=(VIEW.latMax-VIEW.latMin);
const SCALE=VIEW.W/XU, MAP_W=VIEW.W, MAP_H=Math.round(YU*SCALE);
function proj(lat,lon){return [(lon-VIEW.lonMin)*KX*SCALE, (VIEW.latMax-lat)*SCALE];}
function polyPoints(coords){return coords.map(([lat,lon])=>proj(lat,lon).map(n=>n.toFixed(1)).join(",")).join(" ");}
function ringsOf(g){if(g.type==="Polygon")return g.coordinates;const r=[];g.coordinates.forEach(p=>p.forEach(ring=>r.push(ring)));return r;}
function geoPathD(g){return ringsOf(g).map(ring=>ring.map(([lon,lat],i)=>{const[x,y]=proj(lat,lon);return(i===0?"M":"L")+x.toFixed(1)+","+y.toFixed(1);}).join("")+"Z").join(" ");}

function makeSVGDeFacto(){
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox",`0 0 ${MAP_W} ${MAP_H}`);
  svg.setAttribute("xmlns",ns);
  const add=(tag,attrs,parent)=>{const el=document.createElementNS(ns,tag);for(const k in attrs)el.setAttribute(k,attrs[k]);(parent||svg).appendChild(el);return el;};

  // hatch pattern for dissolved territory
  const defs=add("defs",{});
  const pat=add("pattern",{id:"nk-hatch",width:"7",height:"7",patternTransform:"rotate(45)",patternUnits:"userSpaceOnUse"},defs);
  add("rect",{width:"7",height:"7",fill:"#e1e3e7"},pat);
  add("line",{x1:"0",y1:"0",x2:"0",y2:"7",stroke:"#9aa0aa","stroke-width":"2.2"},pat);

  // sea
  add("rect",{width:MAP_W,height:MAP_H,fill:"#cfe1ef"});

  // countries (real boundaries)
  Object.entries(COUNTRIES_GEO).forEach(([iso,c])=>{
    const focus=FOCUS.has(iso), base=focus?"#dbe6f3":"#e9eef4";
    const path=add("path",{d:geoPathD(c.geometry),"fill-rule":"evenodd",
      fill:base,stroke:"#aebfd4","stroke-width":"1","stroke-linejoin":"round"});
    if(focus){
      path.style.cursor="pointer";
      path.addEventListener("mouseenter",()=>path.setAttribute("fill","#c5d6ec"));
      path.addEventListener("mouseleave",()=>path.setAttribute("fill",base));
      path.addEventListener("click",()=>openCountry(COUNTRY_KEY[iso]));
    }
  });

  // country labels
  [["GEORGIA",42.05,43.25],["ARMENIA",40.0,45.0],["AZERBAIJAN",40.3,48.0],
   ["RUSSIA",44.05,43.6],["TURKEY",39.7,40.1],["IRAN",38.55,47.7]].forEach(([n,lat,lon])=>{
    const[x,y]=proj(lat,lon);
    add("text",{x,y,"text-anchor":"middle","font-size":"12.5","font-weight":"700",
      fill:"#5b6e90","letter-spacing":"0.1em","pointer-events":"none"}).textContent=n;
  });

  // territories (de facto)
  Object.entries(TERRITORIES_POLY).forEach(([k,coords])=>{
    const d=DEFACTO[k];if(!d)return;
    const gone=!!d.dissolved;
    const poly=add("polygon",{points:polyPoints(coords),
      fill:gone?"url(#nk-hatch)":d.color,"fill-opacity":gone?"1":"0.8",
      stroke:gone?"#8b9098":"#ffffff","stroke-width":gone?"1.3":"1.6","stroke-linejoin":"round","stroke-dasharray":gone?"6 4":"none"});
    poly.style.cursor="pointer";
    if(!gone){
      poly.addEventListener("mouseenter",()=>poly.setAttribute("fill-opacity","0.96"));
      poly.addEventListener("mouseleave",()=>poly.setAttribute("fill-opacity","0.8"));
    }else{
      poly.addEventListener("mouseenter",()=>poly.setAttribute("stroke","#5a5f66"));
      poly.addEventListener("mouseleave",()=>poly.setAttribute("stroke","#8b9098"));
    }
    poly.addEventListener("click",()=>openState(k));
    const cx=coords.reduce((s,[lt,ln])=>s+proj(lt,ln)[0],0)/coords.length;
    const cy=coords.reduce((s,[lt,ln])=>s+proj(lt,ln)[1],0)/coords.length;
    const t=add("text",{x:cx,y:cy+3,"text-anchor":"middle","font-size":"11","font-weight":"700",
      fill:gone?"#5a5f66":"#fff","pointer-events":"none","paint-order":"stroke",
      stroke:gone?"rgba(255,255,255,.85)":"rgba(0,0,0,.45)","stroke-width":"2.6"});
    t.textContent=d.name.length>16?d.name.split(" ")[0]:d.name;
  });

  // sea labels
  [["Black Sea",42.8,39.55],["Caspian Sea",40.7,50.35]].forEach(([txt,lat,lon])=>{
    const[x,y]=proj(lat,lon);
    add("text",{x,y,"text-anchor":"middle","font-size":"13","fill":"#5d86a6","font-style":"italic","pointer-events":"none"}).textContent=txt;
  });

  return svg;
}

function openState(k){
  const d=DEFACTO[k];if(!d)return;
  const active=d.status.startsWith("Active");
  const inner=document.getElementById("ethInner");

  // Freedom House bar
  let fhHtml="";
  if(d.freedomHouse&&d.freedomHouse.score!==null){
    const sc=d.freedomHouse.score;
    const barColor=sc<40?"#C0493C":sc<60?"#E0A93A":"#2E8B57";
    const yr=d.freedomHouse.year?` (${d.freedomHouse.year})`:"";
    fhHtml=`<div class="f" style="grid-column:1/-1">
      <div class="k">Freedom House${d.dissolved?" · last rating":""}</div>
      <div class="v">${sc}/100 · ${d.freedomHouse.label}${yr}</div>
      <div class="fh-bar"><div class="fh-fill" style="width:${sc}%;background:${barColor}"></div></div>
    </div>`;
  } else {
    fhHtml=`<div class="f"><div class="k">Freedom House</div><div class="v">${d.freedomHouse.label}</div></div>`;
  }

  // Recognised by flags
  let recogHtml="";
  if(d.recognisedBy.length>0){
    recogHtml=`<div class="recog-list">`+d.recognisedBy.map(r=>`<div class="recog-item">${r.flag}<span>${r.name}</span></div>`).join("")+`</div>`;
  }

  // Related publications
  const relPubs=publicPubs().filter(p=>pubMatchesDefacto(p,d)).sort(byDate).slice(0,3);
  let relHtml="";
  if(relPubs.length){
    relHtml=`<div class="modal-pubs"><h4>Related publications</h4>`+
      relPubs.map(p=>{
        const href=p.type==="external"?p.url:`#/article/${p.id}`;
        const target=p.type==="external"?` target="_blank" rel="noopener" data-extid="${p.id}"`:"";
        return `<a class="mpub" href="${href}"${target}>
          <div class="mpimg">${p.photo?`<img src="${esc(p.photo)}" alt="">`:`<div class="mpfb"></div>`}</div>
          <div><div class="mpt">${esc(p.title)}</div><div class="mpd">${fmt(p.date)}${p.type==="external"?" · Featured elsewhere":""}</div></div>
        </a>`;
      }).join("")+`</div>`;
  }

  inner.innerHTML=`<button class="x" aria-label="Close">×</button>
    <div class="eth-head" style="background:${d.color}">
      <div class="fam">${d.dissolved?"Former de facto state":"De facto state"}</div>
      <h2>${esc(d.name)}</h2>
      <div class="sub">Internationally part of ${esc(d.claimed)}</div>
    </div>
    <div class="eth-body">
      <span class="status-pill" style="background:${active?'#E6F4EC':'#FBEAE7'};color:${active?'#2E8B57':'#C0493C'}">${esc(d.status)}</span>
      <div class="eth-facts">
        <div class="f"><div class="k">Capital</div><div class="v">${esc(d.capital)}</div></div>
        <div class="f"><div class="k">Claimed by</div><div class="v">${esc(d.claimed)}</div></div>
        <div class="f"><div class="k">Population</div><div class="v">${esc(d.population||"—")}</div></div>
        <div class="f">
          <div class="k">Recognition</div>
          <div class="v">${esc(d.recog)}</div>
          ${recogHtml}
        </div>
        <div class="f"><div class="k">Next elections</div><div class="v">${esc(d.nextElections)}</div></div>
        ${fhHtml}
      </div>
      ${relHtml}
    </div>`;
  inner.querySelector(".x").onclick=()=>closeModal("ethModal");
  if(relHtml){
    inner.querySelectorAll(".mpub").forEach(a=>{
      if(a.getAttribute("href").startsWith("#")){
        a.addEventListener("click",()=>closeModal("ethModal"));
      }
    });
  }
  openModal("ethModal");
}

document.querySelectorAll(".modal-bg").forEach(bg=>bg.addEventListener("click",e=>{if(e.target===bg)closeModal(bg.id);}));
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".modal-bg.open").forEach(m=>closeModal(m.id));});
document.addEventListener("click",e=>{const tc=e.target.closest&&e.target.closest(".tagchip[data-tag]");if(tc){e.preventDefault();e.stopPropagation();location.hash="#/tag/"+encodeURIComponent(tc.dataset.tag);}},true);
document.addEventListener("click",e=>{const ax=e.target.closest&&e.target.closest("a[data-extid]");if(!ax)return;const id=ax.dataset.extid;let f=true;try{const k="clk:"+id;if(sessionStorage.getItem(k))f=false;else sessionStorage.setItem(k,"1");}catch(_e){}if(f)bumpClick(id);});

/* ---------- admin ---------- */
let editingId=null;
async function openAdmin(){if(SESSION&&!authValid())await adminRefresh();renderAdmin();openModal("adminModal");}
function renderAdmin(){
  const inner=document.getElementById("adminInner");
  if(!authValid()){
    inner.innerHTML=`<button class="x">\u00d7</button>
      <div class="gate"><h2 style="color:var(--navy);font-size:23px">Admin sign in</h2>
        <p>Sign in with your Supabase account to manage publications.</p>
        <div class="field" style="max-width:300px;margin:0 auto 10px"><input type="email" id="loginEmail" placeholder="Email" autocomplete="username"></div>
        <div class="field" style="max-width:300px;margin:0 auto 14px"><input type="password" id="loginPass" placeholder="Password" autocomplete="current-password"></div>
        <button class="btn primary" id="loginBtn">Sign in</button>
        <div id="gateErr" style="color:#C0493C;margin-top:12px;font-size:14px"></div></div>`;
    inner.querySelector(".x").onclick=()=>closeModal("adminModal");
    const doLogin=async()=>{
      const em=inner.querySelector("#loginEmail").value.trim(),pw=inner.querySelector("#loginPass").value;
      const errEl=inner.querySelector("#gateErr"),btn=inner.querySelector("#loginBtn");
      if(!em||!pw){errEl.textContent="Enter your email and password.";return;}
      btn.disabled=true;btn.textContent="Signing in\u2026";errEl.textContent="";
      try{await adminLogin(em,pw);renderAdmin();}
      catch(e){errEl.textContent=e.message||"Sign-in failed.";btn.disabled=false;btn.textContent="Sign in";}
    };
    inner.querySelector("#loginBtn").onclick=doLogin;
    inner.querySelector("#loginPass").onkeydown=e=>{if(e.key==="Enter")doLogin();};
    inner.querySelector("#loginEmail").onkeydown=e=>{if(e.key==="Enter")inner.querySelector("#loginPass").focus();};
    return;
  }
  const ed=editingId?PUBS.find(p=>p.id===editingId):null;
  const v=f=>ed?esc(ed[f]||""):"";
  inner.innerHTML=`<button class="x">×</button>
    <div class="admin-head"><h2>Control panel</h2><span class="pill">${SUPA_ON?'Supabase · signed in':'localStorage'}</span></div>
    <div class="admin-body">
      <div class="toolbar">
        <button class="btn primary" id="newBtn">+ New publication</button>
        <button class="mini danger" id="logoutBtn" style="margin-left:auto">Log out</button>
      </div>
      <div class="field"><label>Title</label><input id="f_title" value="${v('title')}"></div>
      <div class="row2">
        <div class="field"><label>Author</label><input id="f_author" value="${ed?esc(ed.author||''):'Timoleon Ilias'}"></div>
        <div class="field"><label>Date</label><input id="f_date" type="date" value="${ed?esc(ed.date||''):new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Language</label><select id="f_lang">
          <option value="en" ${!ed||ed.lang==='en'?'selected':''}>English 🇬🇧</option>
          <option value="el" ${ed&&ed.lang==='el'?'selected':''}>Greek 🇬🇷</option></select></div>
        <div class="field"><label>Type</label><select id="f_type">
          <option value="internal" ${!ed||ed.type==='internal'?'selected':''}>Full text (own page)</option>
          <option value="pdf" ${ed&&ed.type==='pdf'?'selected':''}>PDF (viewed in-page)</option>
          <option value="external" ${ed&&ed.type==='external'?'selected':''}>External link</option></select></div>
      </div>
      <div class="field" id="urlField" style="display:none"><label>External URL</label><input id="f_url" value="${v('url')}" placeholder="https://..."></div>
      <div class="field" id="pdfField" style="display:none"><label>PDF URL</label>
        <input id="f_pdfurl" value="${v('pdfUrl')}" placeholder="https://…/document.pdf or a Google Drive link">
        <div class="hint">Only this link is saved to the database, never the file itself. Host the PDF anywhere public (your own site, Cloudflare R2, Google Drive…) and paste its link. Google Drive links are converted automatically; the file must be shared “Anyone with the link → Viewer”.</div></div>
      <div class="field"><label>Main category (drives the Publications filter)</label>
        <input id="f_category" list="catList" value="${v('category')}" placeholder="e.g. South Caucasus">
        <datalist id="catList"><option value="South Caucasus"></option><option value="Middle East"></option><option value="Post-Soviet space"></option><option value="Caucasus"></option><option value="Europe"></option><option value="Energy"></option><option value="Global"></option></datalist>
        <div class="hint">One main region or topic. The Publications page builds its filter chips from these.</div></div>
      <div class="field"><label>Tags (comma separated)</label><input id="f_tags" value="${ed?esc((ed.tags||[]).join(', ')):''}"><div class="hint">Add a country name (Georgia, Armenia, Azerbaijan) to make this article appear in that country's related publications. Tags are also clickable filters.</div></div>
      <div class="field"><label>Cover photo URL (optional)</label><input id="f_photo" value="${v('photo')}" placeholder="https://..."></div>
      <div class="field"><label>Excerpt</label><input id="f_excerpt" value="${v('excerpt')}"></div>
      <div class="field" id="bodyField"><label>Article text</label>
        <div class="rte-toolbar" id="rteToolbar">
          <button type="button" data-cmd="undo" title="Undo">↶</button>
          <button type="button" data-cmd="redo" title="Redo">↷</button>
          <span class="rte-sep"></span>
          <button type="button" data-cmd="bold" title="Bold"><b>B</b></button>
          <button type="button" data-cmd="italic" title="Italic"><i>I</i></button>
          <button type="button" data-cmd="underline" title="Underline"><u>U</u></button>
          <button type="button" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
          <button type="button" data-act="hilite" title="Highlight"><span style="background:#fde68a;padding:0 3px;border-radius:2px">H</span></button>
          <span class="rte-sep"></span>
          <button type="button" data-block="h2" title="Subtitle">H2</button>
          <button type="button" data-block="h3" title="Smaller subtitle">H3</button>
          <button type="button" data-block="blockquote" title="Quote">&ldquo;&rdquo;</button>
          <button type="button" data-block="p" title="Normal paragraph">¶</button>
          <span class="rte-sep"></span>
          <button type="button" data-cmd="insertUnorderedList" title="Bulleted list">&bull;&nbsp;List</button>
          <button type="button" data-cmd="insertOrderedList" title="Numbered list">1.&nbsp;List</button>
          <button type="button" data-cmd="justifyLeft" title="Align left">⇤</button>
          <button type="button" data-cmd="justifyCenter" title="Align center">↔</button>
          <button type="button" data-cmd="justifyRight" title="Align right">⇥</button>
          <span class="rte-sep"></span>
          <button type="button" data-act="link" title="Insert link">Link</button>
          <button type="button" data-cmd="unlink" title="Remove link">Unlink</button>
          <button type="button" data-act="hr" title="Divider line">Divider</button>
          <button type="button" data-act="image" title="Insert image">Image</button>
          <span class="rte-sep"></span>
          <button type="button" data-act="table" title="Insert table">Table</button>
          <button type="button" data-act="row" title="Add row to current table">Row +</button>
          <button type="button" data-act="col" title="Add column to current table">Col +</button>
          <span class="rte-sep"></span>
          <button type="button" data-cmd="removeFormat" title="Clear formatting">Clear</button>
        </div>
        <div class="rte" id="f_body" contenteditable="true">${ed?(ed.body||''):''}</div>
        <div class="hint">Select text then apply a style. Use the buttons to add subtitles, lists, dividers, images (with optional caption) and tables.</div>
      </div>
      <div class="field" id="refField"><label>References (one per line)</label><textarea id="f_refs" style="min-height:90px">${ed?esc((ed.references||[]).join("\n")):''}</textarea><div class="hint">Shown in a dedicated box at the end of the article.</div></div>
      <div class="field"><label style="font-weight:500"><input type="checkbox" id="f_feat" ${ed&&ed.featured?'checked':''} style="width:auto;margin-right:8px">Mark as featured (shown as spotlight on home)</label></div>
      <div class="field"><label style="font-weight:500"><input type="checkbox" id="f_draft" ${ed&&ed.draft?'checked':''} style="width:auto;margin-right:8px">Save as draft (hidden from the public site)</label></div>
      <div class="admin-actions"><button class="btn primary" id="saveBtn">Save</button>${ed?'<button class="mini" id="cancelBtn">Cancel</button>':''}</div>
      <h3 style="margin-top:24px;border-bottom:1px solid var(--line);padding-bottom:8px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy)">Published (${PUBS.length})</h3>
      <div class="admin-list" id="adminList"></div>
    </div>`;
  inner.querySelector(".x").onclick=()=>closeModal("adminModal");
  const typeSel=inner.querySelector("#f_type");
  const sync=()=>{const t=typeSel.value,ext=t==="external",pdf=t==="pdf";
    inner.querySelector("#urlField").style.display=ext?"block":"none";
    inner.querySelector("#pdfField").style.display=pdf?"block":"none";
    inner.querySelector("#bodyField").style.display=(ext||pdf)?"none":"block";
    inner.querySelector("#refField").style.display=ext?"none":"block";};
  typeSel.onchange=sync;sync();
  (function(){
    const tb=inner.querySelector("#rteToolbar"),rte=inner.querySelector("#f_body");
    if(!tb||!rte)return;
    tb.querySelectorAll("button").forEach(b=>b.addEventListener("mousedown",e=>e.preventDefault()));
    tb.addEventListener("click",e=>{
      const b=e.target.closest("button");if(!b)return;
      rte.focus();
      if(b.dataset.cmd){document.execCommand(b.dataset.cmd,false,null);}
      else if(b.dataset.block){document.execCommand("formatBlock",false,b.dataset.block);}
      else if(b.dataset.act==="hr"){document.execCommand("insertHorizontalRule",false,null);}
      else if(b.dataset.act==="hilite"){document.execCommand("hiliteColor",false,"#fde68a");}
      else if(b.dataset.act==="link"){const u=prompt("Link URL (https://...):");if(u)document.execCommand("createLink",false,u);}
      else if(b.dataset.act==="image"){rteImage(rte);}
      else if(b.dataset.act==="table"){rteTable(rte);}
      else if(b.dataset.act==="row"){rteAddRow(rte);}
      else if(b.dataset.act==="col"){rteAddCol(rte);}
    });
  })();
  inner.querySelector("#newBtn").onclick=()=>{editingId=null;renderAdmin();};
  inner.querySelector("#logoutBtn").onclick=()=>{adminLogout();editingId=null;closeModal("adminModal");};
  if(ed)inner.querySelector("#cancelBtn").onclick=()=>{editingId=null;renderAdmin();};
  inner.querySelector("#saveBtn").onclick=async()=>{
    const g=id=>inner.querySelector("#"+id).value.trim();
    const title=g("f_title");if(!title){alert("A title is required.");return;}
    let id=ed?ed.id:title.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,48)||("p"+Date.now());
    if(!ed&&PUBS.some(p=>p.id===id))id+="-"+Date.now().toString().slice(-4);
    const refs=inner.querySelector("#f_refs").value.split("\n").map(s=>s.trim()).filter(Boolean);
    const obj={id,title,author:g("f_author")||"Timoleon Ilias",date:g("f_date"),lang:g("f_lang"),type:g("f_type"),
      url:g("f_url"),pdfUrl:g("f_pdfurl"),category:g("f_category"),tags:g("f_tags").split(",").map(s=>s.trim()).filter(Boolean),
      photo:g("f_photo"),excerpt:g("f_excerpt"),body:inner.querySelector("#f_body").innerHTML.trim(),
      references:refs,featured:inner.querySelector("#f_feat").checked,draft:inner.querySelector("#f_draft").checked};
    let demoted=null;
    if(obj.featured){const prev=PUBS.find(p=>p.featured&&p.id!==obj.id);if(prev){prev.featured=false;demoted=prev;}}
    if(ed){PUBS[PUBS.findIndex(p=>p.id===ed.id)]=obj;}else PUBS.unshift(obj);
    await persistOne(obj);if(demoted)await persistOne(demoted);
    const app=document.getElementById("app");if(app){app.innerHTML=viewHome();initHomeMap();wireLoadMore();wireHomeSearch();}
    editingId=null;renderAdmin();
  };
  const list=inner.querySelector("#adminList");
  list.innerHTML=PUBS.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(p=>
    `<div class="admin-row">${flagFor(p.lang)}<div class="ai"><b>${p.draft?'<span class="dbadge">Draft</span>':''}${esc(p.title)}</b><small>${fmt(p.date)} · ${p.type==='external'?'external':p.type==='pdf'?'PDF':'text'} · ${p.type==='external'?'\uD83D\uDD17 '+clickCount(p.id)+' clicks':'\uD83D\uDC41 '+viewCount(p.id)+' views'} · ${(p.tags||[]).join(', ')}</small></div>
      <button class="mini" data-edit="${p.id}">Edit</button><button class="mini danger" data-del="${p.id}">Delete</button></div>`).join("");
  list.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{editingId=b.dataset.edit;renderAdmin();});
  list.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{if(confirm("Delete this publication?")){const id=b.dataset.del;PUBS=PUBS.filter(p=>p.id!==id);await removeOne(id);const app=document.getElementById("app");if(app){app.innerHTML=viewHome();initHomeMap();wireLoadMore();wireHomeSearch();}renderAdmin();}});
}
function exportJSON(){const blob=new Blob([JSON.stringify(PUBS,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="publications.json";a.click();URL.revokeObjectURL(a.href);}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{const d=JSON.parse(r.result);if(Array.isArray(d)){PUBS=d;if(SUPA_ON){for(const p of PUBS){await persistOne(p);}}else{save();}renderAdmin();}else alert("JSON must be an array.");}catch(x){alert("Invalid JSON.");}};r.readAsText(f);}

/* ---------- router ---------- */
function setActiveNav(path){
  document.querySelectorAll("nav.main a[data-route]").forEach(a=>{
    const r=a.dataset.route;a.classList.toggle("active",r==="/"?path==="/":path.indexOf(r)===0);
  });
}
function router(){
  const hash=location.hash.replace(/^#/,"")||"/";
  const parts=hash.split("/").filter(Boolean);
  const app=document.getElementById("app");
  let navPath="/"+(parts[0]||"");
  if(parts[0]==="category"||parts[0]==="article"||parts[0]==="tag")navPath="/publications";
  if(parts[0]==="country")navPath="/countries";
  setActiveNav(navPath);
  document.getElementById("nav").classList.remove("open");

  if(parts[0]==="admin"){app.innerHTML=viewHome();initHomeMap();wireLoadMore();wireHomeSearch();openAdmin();window.scrollTo(0,0);return;}
  if(parts[0]==="publications"){app.innerHTML=viewPublications();wireLangFilter();window.scrollTo(0,0);return;}
  if(parts[0]==="category"){app.innerHTML=viewCategory(parts.slice(1).join("/"));wireLangFilter();window.scrollTo(0,0);return;}
  if(parts[0]==="tag"){app.innerHTML=viewTag(parts.slice(1).join("/"));wireLangFilter();window.scrollTo(0,0);return;}
  if(parts[0]==="countries"){app.innerHTML=viewCountries();window.scrollTo(0,0);return;}
  if(parts[0]==="country"){app.innerHTML=viewCountry(parts[1]);wireCountry();wireSliders();wireLoadMore();window.scrollTo(0,0);return;}
  if(parts[0]==="about"){app.innerHTML=viewAbout();window.scrollTo(0,0);return;}
  if(parts[0]==="article"){const ap=PUBS.find(x=>x.id===parts[1]);app.innerHTML=viewArticle(parts[1]);setShareMeta(ap||null);wireArticle();
    if(ap){let fresh=true;try{const sk="seen:"+ap.id;if(sessionStorage.getItem(sk))fresh=false;else sessionStorage.setItem(sk,"1");}catch(e){}
      if(fresh)bumpView(ap.id).then(()=>{const el=document.getElementById("viewCount");if(el)el.textContent=fmtViews(viewCount(ap.id));});}
    window.scrollTo(0,0);return;}
  if(parts[0]==="maps"){setShareMeta(null);app.innerHTML=viewMaps();initDeFacto();window.scrollTo(0,0);return;}
  setShareMeta(null);app.innerHTML=viewHome();initHomeMap();wireLoadMore();wireHomeSearch();window.scrollTo(0,0);
}
function setShareMeta(p){
  const t=p?`${p.title} · t.ilias`:"t.ilias · Geopolitics & Security Analysis";
  const d=p?(p.excerpt||p.title||""):"Analysis, publications and interactive maps on the geopolitics and security of the South Caucasus — Armenia, Azerbaijan, Georgia and the post-Soviet space — by Timoleon Ilias.";
  const img=(p&&p.photo)?p.photo:"https://www.tilias.eu/og.png";
  document.title=t;
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.setAttribute("content",v);};
  set("og-title",t);set("tw-title",t);set("og-desc",d);set("tw-desc",d);
  set("og-image",img);set("tw-image",img);set("og-url",location.href);
  const md=document.querySelector('meta[name="description"]');if(md)md.setAttribute("content",d);
}
function openShare(href){
  const w=600,h=560;
  const y=(window.outerHeight-h)/2+(window.screenY||0),x=(window.outerWidth-w)/2+(window.screenX||0);
  window.open(href,"shareWin","noopener,width="+w+",height="+h+",top="+Math.max(0,y)+",left="+Math.max(0,x));
}
function wireArticle(){
  const url=location.href;
  const title=(document.querySelector(".article h1")||{}).textContent||document.title;
  const enc=encodeURIComponent;
  const link=(id,href)=>{const el=document.getElementById(id);if(el){el.href=href;el.addEventListener("click",e=>{e.preventDefault();openShare(href);});}};
  link("shareFb",`https://www.facebook.com/sharer/sharer.php?u=${enc(url)}`);
  link("shareX",`https://twitter.com/intent/tweet?url=${enc(url)}&text=${enc(title)}`);
  link("shareLi",`https://www.linkedin.com/sharing/share-offsite/?url=${enc(url)}`);
  const nat=document.getElementById("shareNative");
  const coarse=window.matchMedia&&window.matchMedia("(pointer:coarse)").matches;
  if(nat&&navigator.share&&coarse){nat.hidden=false;nat.onclick=()=>navigator.share({title,url}).catch(()=>{});["shareFb","shareX","shareLi"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display="none";});}
  const b=document.getElementById("copyLink");
  if(b)b.onclick=()=>{try{navigator.clipboard.writeText(url);}catch(e){}b.textContent="Link copied ✓";setTimeout(()=>b.textContent="Copy link",1600);};
}
document.getElementById("menuBtn").onclick=()=>document.getElementById("nav").classList.toggle("open");
window.addEventListener("hashchange",router);

/* ---- content protection (deterrent only) ---- */
(function(){
  function editable(el){return !!(el&&el.closest&&el.closest('input,textarea,select,[contenteditable],.rte,#adminModal'));}
  ["copy","cut"].forEach(ev=>document.addEventListener(ev,e=>{if(!editable(e.target))e.preventDefault();}));
  document.addEventListener("contextmenu",e=>{if(!editable(e.target))e.preventDefault();});
  document.addEventListener("dragstart",e=>{if(e.target&&e.target.tagName==="IMG")e.preventDefault();});
})();

/* ---------- boot ---------- */
function renderPathArticle(){
  const m=location.pathname.match(/^\/p\/([^/]+)\/?$/);
  if(!m)return false;
  const id=decodeURIComponent(m[1]);
  const ap=PUBS.find(x=>x.id===id);
  const appEl=document.getElementById("app");
  const nav=document.getElementById("nav");if(nav)nav.classList.remove("open");
  appEl.innerHTML=viewArticle(id);setShareMeta(ap||null);
  if(ap&&ap.type!=="external"){wireArticle();let fresh=true;try{const sk="seen:"+ap.id;if(sessionStorage.getItem(sk))fresh=false;else sessionStorage.setItem(sk,"1");}catch(e){}if(fresh)bumpView(ap.id);}
  window.scrollTo(0,0);return true;
}
load().then(loadViews).then(()=>{if(!renderPathArticle())router();});
</script>
